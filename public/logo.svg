<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="100%" height="100%">
  <defs>
    <style>
      /* --- ANIMACIONES CSS EN BUCLE (10 SEGUNDOS) --- */

      /* Letra D */
      @keyframes animD {
        0% { stroke-dashoffset: 1000; fill: transparent; }
        12% { stroke-dashoffset: 0; fill: transparent; }
        16%, 95% { stroke-dashoffset: 0; fill: #FFFFFF; }
        98%, 100% { stroke-dashoffset: 1000; fill: transparent; }
      }

      /* Letra S */
      @keyframes animS {
        0%, 4% { stroke-dashoffset: 1000; fill: transparent; }
        16% { stroke-dashoffset: 0; fill: transparent; }
        20%, 95% { stroke-dashoffset: 0; fill: #FFFFFF; }
        98%, 100% { stroke-dashoffset: 1000; fill: transparent; }
      }

      /* Letra P */
      @keyframes animP {
        0%, 8% { stroke-dashoffset: 1000; fill: transparent; }
        20% { stroke-dashoffset: 0; fill: transparent; }
        24%, 95% { stroke-dashoffset: 0; fill: #FFFFFF; }
        98%, 100% { stroke-dashoffset: 1000; fill: transparent; }
      }

      /* Letra I */
      @keyframes animI {
        0%, 12% { stroke-dashoffset: 1000; fill: transparent; }
        22% { stroke-dashoffset: 0; fill: transparent; }
        26%, 95% { stroke-dashoffset: 0; fill: #FFFFFF; }
        98%, 100% { stroke-dashoffset: 1000; fill: transparent; }
      }

      /* Triángulo Rojo */
      @keyframes animTri {
        0%, 14% { stroke-dashoffset: 300; fill: transparent; }
        24% { stroke-dashoffset: 0; fill: transparent; }
        27%, 95% { stroke-dashoffset: 0; fill: #E13A3E; }
        98%, 100% { stroke-dashoffset: 300; fill: transparent; }
      }

      /* Línea Inferior */
      @keyframes animLin {
        0%, 22% { transform: scaleX(0); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
        28%, 95% { transform: scaleX(1); animation-timing-function: ease; }
        98%, 100% { transform: scaleX(0); }
      }

      /* --- ESTILOS BASE DE LOS TRAZOS --- */
      .letra {
        fill: transparent;
        stroke: #FFFFFF;
        stroke-width: 2;
        stroke-linejoin: round;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
      }

      /* Asignación de animaciones */
      .letra-d { animation: animD 10s infinite; }
      .letra-s { animation: animS 10s infinite; }
      .letra-p { animation: animP 10s infinite; }
      .letra-i { animation: animI 10s infinite; }

      /* Elementos Rojos */
      .triangulo-rojo {
        fill: transparent;
        stroke: #E13A3E;
        stroke-width: 2;
        stroke-dasharray: 300;
        stroke-dashoffset: 300;
        animation: animTri 10s infinite;
      }

      .linea-inferior {
        fill: #E13A3E;
        transform: scaleX(0);
        transform-origin: left;
        animation: animLin 10s infinite;
      }
    </style>
  </defs>

  <g transform="translate(40, 40)">
    <path class="letra letra-d" d="M 98,70 L 60,108 L 60,250 L 175,250 C 190,250 195,235 195,210 L 195,110 C 195,85 190,70 175,70 Z M 110,120 L 145,120 C 148,120 148,125 148,140 L 148,180 C 148,195 148,200 145,200 L 110,200 Z" />
    <path class="letra letra-s" d="M 215,70 L 325,70 L 325,120 L 270,120 C 265,120 265,125 265,135 L 265,142 C 265,152 270,158 280,158 L 325,158 L 325,250 L 215,250 L 215,200 L 270,200 C 275,200 275,195 275,185 L 275,178 C 275,168 270,162 260,162 L 215,162 Z" />
    <path class="letra letra-p" d="M 382,70 L 345,107 L 345,250 L 395,250 L 395,200 L 430,200 C 465,200 480,185 480,150 L 480,120 C 480,85 465,70 430,70 Z M 395,120 L 430,120 C 433,120 433,125 433,135 L 433,150 C 433,160 433,165 430,165 L 395,165 Z" />
    <path class="letra letra-i" d="M 500,135 L 550,135 L 550,250 L 500,250 Z" />
    <polygon class="triangulo-rojo" points="500,70 550,70 550,120" />
    <rect class="linea-inferior" x="60" y="275" width="490" height="10" rx="2" />
  </g>
</svg>
